<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заметки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6a00 0%, #ff9500 50%, #ffcc00 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(255, 106, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #ff6a00 0%, #ff9500 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .stats {
            background: rgba(255,255,255,0.25);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 1.1em;
            backdrop-filter: blur(5px);
        }
        
        .controls {
            padding: 20px 30px;
            background: #fff5e6;
            border-bottom: 2px solid #ff9500;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff6a00 0%, #ff9500 100%);
            color: white;
            box-shadow: 0 2px 5px rgba(255, 106, 0, 0.3);
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #ff5500 0%, #ff8500 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 106, 0, 0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #ff9500 0%, #ffaa33 100%);
            color: white;
            box-shadow: 0 2px 5px rgba(255, 149, 0, 0.3);
        }
        
        .btn-secondary:hover {
            background: linear-gradient(135deg, #ff8500 0%, #ff9a1a 100%);
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ff6a00 0%, #ff8c00 100%);
            color: white;
            box-shadow: 0 2px 5px rgba(255, 106, 0, 0.3);
        }
        
        .btn-danger:hover {
            background: linear-gradient(135deg, #ff5500 0%, #ff7a00 100%);
            transform: translateY(-2px);
        }
        
        .content {
            padding: 30px;
            min-height: 400px;
            background: #fffaf5;
        }
        
        .notes-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .note-card {
            background: white;
            border: 1px solid #ffd89a;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(255, 106, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .note-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff6a00, #ff9500, #ffcc00);
        }
        
        .note-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 106, 0, 0.2);
            border-color: #ff9500;
        }
        
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #ff9500;
            font-size: 0.9em;
            color: #ff6a00;
        }
        
        .note-header strong {
            color: #ff6a00;
            font-size: 1.1em;
        }
        
        .note-date {
            color: #ff9500;
        }
        
        .note-title {
            font-size: 1.3em;
            color: #ff6a00;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .note-content {
            color: #8b5a2b;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        
        .delete-btn {
            background: linear-gradient(135deg, #ff6a00 0%, #ff9500 100%);
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            margin-top: 10px;
        }
        
        .delete-btn:hover {
            background: linear-gradient(135deg, #ff5500 0%, #ff8500 100%);
            transform: translateY(-2px);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #ff9500;
            font-size: 1.2em;
        }
        
        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
            
            .notes-list {
                grid-template-columns: 1fr;
            }
        }
        
        /* Анимация для кнопок */
        button:active {
            transform: translateY(0);
        }
        
        /* Стиль для скроллбара */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #fff5e6;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ff6a00, #ff9500);
            border-radius: 5px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #ff5500, #ff8500);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Мои заметки</h1>
            <div id="stats" class="stats">Загрузка...</div>
        </div>
        
        <div class="controls">
            <button class="btn-secondary" onclick="showAllNotes()">📋 Показать заметки</button>
            <button class="btn-primary" onclick="addNote()">➕ Добавить заметку</button>
            <button class="btn-danger" onclick="if(confirm('Удалить все заметки?')) deleteAllNotes()">🗑 Удалить все</button>
        </div>
        
        <div id="content" class="content">
            <div class="empty-state">
                📭 Нажмите "Показать заметки" чтобы увидеть список
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
